name: legal_red_line
version: 1.0.0
description: "AI Legal Assistant for simplifying clauses and detecting risk."
author: "Antigravity Assistant"
license: "MIT"

environment:
  class: legal_env:LegalRedLineEnv
  observation_space:
    type: object
    properties:
      clause: { type: string }
      history: { type: array, items: { type: string } }
      task_name: { type: string }
  action_space:
    type: object
    properties:
      simplified_text: { type: string }
      risk: { type: string, enum: [SAFE, NOT SAFE] }
      key_points: { type: array, items: { type: string } }
  reward_range: [0.0, 1.0]

tasks:
  - id: late_payment
    difficulty: easy
    description: "Handle a simple late payment penalty clause."
  - id: termination_notice
    difficulty: medium
    description: "Handle a confidentiality/termination clause with fees."
  - id: indemnification
    difficulty: hard
    description: "Handle a complex indemnification and liability clause."

tags:
  - openenv
  - legal
  - nlp
